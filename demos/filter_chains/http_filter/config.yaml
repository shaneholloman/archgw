version: v0.3.0

agents:
  - id: rag_agent
    url: http://localhost:10505

filters:
  - id: input_guards
    url: http://localhost:10500
    type: http
  - id: query_rewriter
    url: http://localhost:10501
    type: http
  - id: context_builder
    url: http://localhost:10502
    type: http

model_providers:
  - model: openai/gpt-4o-mini
    access_key: $OPENAI_API_KEY
    default: true
  - model: openai/gpt-4o
    access_key: $OPENAI_API_KEY

model_aliases:
  fast-llm:
    target: gpt-4o-mini
  smart-llm:
    target: gpt-4o

listeners:
  - type: agent
    name: agent_1
    port: 8001
    router: plano_orchestrator_v1
    agents:
      - id: rag_agent
        description: virtual assistant for retrieval augmented generation tasks
        input_filters:
          - input_guards
          - query_rewriter
          - context_builder
tracing:
  random_sampling: 100
